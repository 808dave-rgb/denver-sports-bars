<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denver Sports Bars Directory - All Teams</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.8;
        }
        
        .filters {
            padding: 30px;
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .filter-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #334155;
        }
        
        select, input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            background: white;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .sport-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .sport-btn {
            padding: 12px 24px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .sport-btn:hover {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        
        .sport-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
        
        .sport-btn.nfl { border-color: #ff6b6b; }
        .sport-btn.nfl.active { background: #ff6b6b; border-color: #ff6b6b; }
        
        .sport-btn.mlb { border-color: #4ecdc4; }
        .sport-btn.mlb.active { background: #4ecdc4; border-color: #4ecdc4; }
        
        .sport-btn.nhl { border-color: #45b7d1; }
        .sport-btn.nhl.active { background: #45b7d1; border-color: #45b7d1; }
        
        .sport-btn.nba { border-color: #f9ca24; color: #333; }
        .sport-btn.nba.active { background: #f9ca24; border-color: #f9ca24; }
        
        .results {
            padding: 30px;
        }
        
        .result-count {
            margin-bottom: 20px;
            font-size: 1.1em;
            color: #64748b;
        }
        
        .bar-card {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.2s;
        }
        
        .bar-card:hover {
            border-color: #3b82f6;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1);
        }
        
        .bar-name {
            font-size: 1.4em;
            font-weight: bold;
            color: #1e293b;
            margin-bottom: 10px;
        }
        
        .bar-info {
            color: #64748b;
            margin-bottom: 8px;
        }
        
        .bar-info strong {
            color: #334155;
        }
        
        .teams-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .team-tag {
            background: #eff6ff;
            color: #1e40af;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .sport-tag {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: bold;
            margin-right: 6px;
        }
        
        .sport-tag.nfl { background: #ff6b6b; color: white; }
        .sport-tag.mlb { background: #4ecdc4; color: white; }
        .sport-tag.nhl { background: #45b7d1; color: white; }
        .sport-tag.nba { background: #f9ca24; color: #333; }
        
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }
        
        .no-results-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
            
            .stats {
                gap: 20px;
            }
            
            .sport-btn {
                flex: 1 1 45%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏈⚾🏒🏀 Denver Sports Bars</h1>
            <div class="subtitle">Find Where Your Team Watches Games</div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-number" id="totalBars">80</div>
                    <div class="stat-label">Unique Bars</div>
                </div>
                <div class="stat">
                    <div class="stat-number">124</div>
                    <div class="stat-label">Teams Covered</div>
                </div>
                <div class="stat">
                    <div class="stat-number">4</div>
                    <div class="stat-label">Sports</div>
                </div>
            </div>
        </header>
        
        <div class="filters">
            <div class="filter-group">
                <label>Filter by Sport:</label>
                <div class="sport-buttons">
                    <button class="sport-btn nfl active" data-sport="NFL">🏈 NFL</button>
                    <button class="sport-btn mlb active" data-sport="MLB">⚾ MLB</button>
                    <button class="sport-btn nhl active" data-sport="NHL">🏒 NHL</button>
                    <button class="sport-btn nba active" data-sport="NBA">🏀 NBA</button>
                </div>
            </div>
            
            <div class="filter-group">
                <label for="searchBar">Search Bars or Teams:</label>
                <input type="text" id="searchBar" placeholder="e.g., Steelers, Blake Street, LoDo...">
            </div>
        </div>
        
        <div class="results">
            <div class="result-count" id="resultCount">Loading bars...</div>
            <div id="barsList"></div>
        </div>
    </div>
    
    <script>
        // Bars data will be loaded from CSV
        let barsData = [];
        let activeSports = new Set(['NFL', 'MLB', 'NHL', 'NBA']);
        
        // Load CSV data
        async function loadBarsData() {
            try {
                const response = await fetch('denver-sports-bars-google-maps.csv');
                const text = await response.text();
                const lines = text.trim().split('\n');
                const headers = lines[0].split(',');
                
                barsData = lines.slice(1).map(line => {
                    const values = parseCSVLine(line);
                    return {
                        name: values[0],
                        address: values[1],
                        description: values[2],
                        sport: values[3],
                        teams: values[4]
                    };
                });
                
                renderBars();
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('barsList').innerHTML = '<div class="no-results"><div class="no-results-icon">⚠️</div><h3>Error loading data</h3><p>Please make sure denver-sports-bars-google-maps.csv is in the same directory.</p></div>';
            }
        }
        
        function parseCSVLine(line) {
            const values = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    values.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            values.push(current.trim());
            return values;
        }
        
        function renderBars() {
            const searchTerm = document.getElementById('searchBar').value.toLowerCase();
            
            const filteredBars = barsData.filter(bar => {
                // Filter by active sports
                const barSports = bar.sport.split(',').map(s => s.trim());
                const hasActiveSport = barSports.some(s => activeSports.has(s));
                if (!hasActiveSport) return false;
                
                // Filter by search term
                if (searchTerm) {
                    const searchableText = (bar.name + bar.teams + bar.description).toLowerCase();
                    if (!searchableText.includes(searchTerm)) return false;
                }
                
                return true;
            });
            
            document.getElementById('resultCount').textContent = 
                `Showing ${filteredBars.length} of ${barsData.length} bars`;
            
            if (filteredBars.length === 0) {
                document.getElementById('barsList').innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">🔍</div>
                        <h3>No bars found</h3>
                        <p>Try adjusting your filters or search term</p>
                    </div>
                `;
                return;
            }
            
            const html = filteredBars.map(bar => {
                const sports = bar.sport.split(',').map(s => s.trim());
                const sportTags = sports.map(s => 
                    `<span class="sport-tag ${s.toLowerCase()}">${s}</span>`
                ).join('');
                
                const teams = bar.teams.split(',').map(t => t.trim()).filter(t => t);
                const teamTags = teams.slice(0, 5).map(t => 
                    `<span class="team-tag">${t}</span>`
                ).join('');
                
                const moreTeams = teams.length > 5 ? 
                    `<span class="team-tag">+${teams.length - 5} more</span>` : '';
                
                const phone = bar.description.match(/Phone: ([^\n]+)/)?.[1] || '';
                const website = bar.description.match(/Web: ([^\n]+)/)?.[1] || '';
                
                return `
                    <div class="bar-card">
                        <div class="bar-name">
                            ${sportTags}
                            ${bar.name}
                        </div>
                        <div class="bar-info"><strong>📍 Address:</strong> ${bar.address}</div>
                        ${phone ? `<div class="bar-info"><strong>📞 Phone:</strong> <a href="tel:${phone}">${phone}</a></div>` : ''}
                        ${website ? `<div class="bar-info"><strong>🌐 Website:</strong> <a href="http://${website}" target="_blank">${website}</a></div>` : ''}
                        <div class="teams-tags">
                            ${teamTags}${moreTeams}
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('barsList').innerHTML = html;
        }
        
        // Event listeners
        document.querySelectorAll('.sport-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const sport = btn.dataset.sport;
                btn.classList.toggle('active');
                
                if (btn.classList.contains('active')) {
                    activeSports.add(sport);
                } else {
                    activeSports.delete(sport);
                }
                
                renderBars();
            });
        });
        
        document.getElementById('searchBar').addEventListener('input', renderBars);
        
        // Load data on page load
        loadBarsData();
    </script>
</body>
</html>
